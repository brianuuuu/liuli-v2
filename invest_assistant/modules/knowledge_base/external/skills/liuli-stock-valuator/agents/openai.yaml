interface:
  display_name: "琉璃标的估值师"
  short_description: "用琉璃标的估值师生成A股三年估值报告"
  default_prompt: "Use $liuli-stock-valuator to value 600519.SH with the 标的估值师 workflow."

dependencies:
  tools:
    - type: "mcp"
      value: "liuli"
      description: "Fetch liuli researcher profile, local announcements/news, and upload research feedback."
    - type: "mcp"
      value: "tushareMcp"
      description: "Fetch A-share structured financial, valuation, and market data."

policy:
  allow_implicit_invocation: true
